apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubernator
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - poddisruptionbudget.yaml
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: kubernator
images:
  - name: ghcr.io/tugcantopaloglu/kubernator-web
    newTag: 0.2.0
